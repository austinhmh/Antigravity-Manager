name: Build and Push Headless Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag
        required: false
        default: latest
      platforms:
        description: Build platforms (comma separated)
        required: false
        default: linux/amd64
      use_mirror:
        description: USE_MIRROR build arg (auto/true/false)
        required: false
        default: false

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: prep
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/antigravity-manager"
          SHORT_SHA="${GITHUB_SHA::7}"

          {
            echo "image=${IMAGE}"
            echo "short_sha=${SHORT_SHA}"
            echo 'tags<<EOF'
            echo "${IMAGE}:${{ inputs.tag }}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            if [ "${{ inputs.tag }}" != "latest" ]; then
              echo "${IMAGE}:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USE_MIRROR=${{ inputs.use_mirror }}
